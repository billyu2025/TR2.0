<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TR Report System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            color: white;
        }

        .logo-wrapper {
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease;
        }

        .main-logo {
            max-width: 150px;
            max-height: 150px;
            width: auto;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }

        h1 {
            font-size: 48px;
            margin-bottom: 16px;
            animation: fadeInDown 0.8s ease;
        }

        .subtitle {
            font-size: 20px;
            margin-bottom: 40px;
            opacity: 0.9;
            animation: fadeInUp 0.8s ease;
        }

        .redirect-info {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 24px 32px;
            border-radius: 16px;
            margin-bottom: 30px;
            animation: fadeIn 1s ease;
        }

        .redirect-info p {
            font-size: 18px;
            margin: 0;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .manual-link {
            margin-top: 20px;
            animation: fadeIn 1.5s ease;
        }

        .manual-link a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 12px 24px;
            border: 2px solid white;
            border-radius: 8px;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .manual-link a:hover {
            background: white;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="images/logo.png" alt="VSC Logo" class="main-logo">
        </div>
        <h1>TR Report System</h1>
        <p class="subtitle">测试报告管理系统</p>
        
        <div class="redirect-info">
            <p>正在跳转到登录页面...</p>
            <div class="spinner"></div>
        </div>

        <div class="manual-link">
            <a href="login.html">点击这里立即跳转</a>
        </div>
    </div>

    <script>
        // 2秒后自动跳转到登录页面
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2000);
    </script>
</body>
</html>
